# Test Configuration
spring.application.name=foodly-backend-test

# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=false

# Server Configuration
server.port=0

# JWT Configuration for Tests
jwt.secret=test-jwt-secret-key-for-testing-only
jwt.expiration=86400000

# CORS Configuration for Tests
cors.allowed-origins=http://localhost:3000
app.oauth2.google.enabled=false
app.oauth2.authorized-redirect-uri=http://localhost:3000/auth/callback
jwt.cookie-name=FOODLY_ACCESS_TOKEN
jwt.cookie-secure=false
jwt.cookie-same-site=Lax

# Disable security for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration 
